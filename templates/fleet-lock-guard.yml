name: Fleet lock guard

on:
  pull_request:
    branches: [main]
    paths:
      - ".agents/**"
      - ".github/workflows/fleet-lock-guard.yml"
  push:
    branches: [main]
    paths:
      - ".agents/**"
      - ".github/workflows/fleet-lock-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fleet-lock:
    name: Fleet lock guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify FLEET.lock when .agents/ changes
        env:
          FLEET_SYNC_TOKEN: ${{ secrets.FLEET_SYNC_TOKEN }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash .agents/scripts/fleet-lock-check.sh
