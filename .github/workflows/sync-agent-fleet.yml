# Sync agent fleet — weekly subtree pull from jsolly/dotagents `fleet` branch.
#
# Requires repository secret FLEET_SYNC_TOKEN (fine-grained PAT: read jsolly/dotagents).
# Set or rotate (token not echoed):
#   read -s FLEET_SYNC_TOKEN && export FLEET_SYNC_TOKEN
#   for repo in family-memory alert-hub checkboxes todoist-backlog-scheduler \
#     misc-notifications stocktextalerts awesome-django-blog jsolly-website GeoRoids; do
#     gh secret set FLEET_SYNC_TOKEN --repo "jsolly/$repo" --body "$FLEET_SYNC_TOKEN"
#   done

name: Sync agent fleet

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull latest fleet from dotagents
        env:
          FLEET_SYNC_TOKEN: ${{ secrets.FLEET_SYNC_TOKEN }}
        run: |
          if [ -z "${FLEET_SYNC_TOKEN}" ]; then
            echo "::error::Missing FLEET_SYNC_TOKEN repository secret (read-only PAT for jsolly/dotagents)."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove dotagents 2>/dev/null || true
          git remote add dotagents "https://x-access-token:${FLEET_SYNC_TOKEN}@github.com/jsolly/dotagents.git"
          git fetch dotagents fleet
          if ! git subtree pull --prefix=.agents dotagents fleet --squash -m "CI: sync agent fleet from dotagents"; then
            echo "Subtree pull failed or no changes"
            exit 0
          fi
          FLEET_SHA="$(git rev-parse dotagents/fleet^{commit})"
          printf 'sha: %s\n' "$FLEET_SHA" > .agents/FLEET.lock
          bash .agents/scripts/link-fleet-rules.sh
          if [[ -x .agents/scripts/merge-cursor-git-guard.sh ]]; then
            bash .agents/scripts/merge-cursor-git-guard.sh
          fi
          git add -A .agents
          git add -f .cursor/rules .cursor/hooks.json || true
          if git diff --cached --quiet; then
            echo "Fleet already up to date"
            exit 0
          fi
          git commit -m "CI: sync agent fleet from dotagents"
          git push
